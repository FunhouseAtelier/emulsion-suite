[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "emulsion"
version = "0.1.0"
description = "Python-first web framework fusing FastAPI with React islands"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "jinja2>=3.1.4",
    "markupsafe>=2.1.5",
    "pydantic>=2.7.0",
    "uvicorn[standard]>=0.30.0",
    "watchfiles>=0.22.0",
    "typer>=0.12.0",
    "anyio>=4.4.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
]

[project.scripts]
emulsion = "emulsion.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/emulsion"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
